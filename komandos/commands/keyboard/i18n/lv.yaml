description: |
  <div class="module-description">
    <h3>Tastatūras taustiņi un kombinācijas</h3>
    <ul>
      <li><code>pa kreisi</code></li>
      <li><code>pa labi</code></li>
      <li><code>augšup</code></li>
      <li><code>lejup</code></li>      
      <li><code>lapa augšup</code></li> - PgUp taustiņš, arī peles ritināšana augšup
      <li><code>lapa lejup</code></li> - PgDn taustiņš, arī peles ritināšana lejup
      <li><code>enter, ievadi</code></li>
      <li><code>atpakaļ, bekspeis</code></li>
      <li><code>iziet, eskeip</code></li>
      <li><code>dzēst, dzēs, izdzēst, izdzēs</code></li> - Delete taustiņš
      <li><code>tab</code></li>
      <li><code>atzīmē visu, iezīmē visu</code></li> - Ctrl-A taustiņu kombinācija
      <li><code>kopē, kopēt</code></li> - Ctrl-C taustiņu kombinācija
      <li><code>ielīmē, ielīmēt</code></li> - Ctrl-V taustiņu kombinācija
      <li><code>atcelt, atcel</code></li> - Ctrl-Z taustiņu kombinācija
      <li><code>atkārtot, atkārto</code></li> - Ctrl-Y taustiņu kombinācija
      <li><code>vindous</code></li> - Windows taustiņš
     </ul>
  </div>
