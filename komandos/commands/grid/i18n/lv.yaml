description:  |
  <div class="module-description">
    <h3>Šūnu tīkls</h3>
    <p>Tīkls palīdz novietot peles kursoru vajadzīgajā ekrāna vietā.</p>
    <p>Lai attēlotu tīklu, saki vārdu <code>tīkls</code>. 
       Pēc tam izvēlies vienu no deviņām šūnām, nosaucot tās numuru. Peles kursors tiks novietots apgabala centrā.
       Pēc tam var uzreiz veikt vajadzīgo darbību ar peli, nosaucot kādu no peles komandām, 
       vai arī turpināt fokusēšanos, atkal nosaucot šūnas numuru.
    </p>
    <p>Tīkls tiek aizvērts, nosaucot jebkuru citu komandu vai arī sakot vienu no vārdiem <code>beigt, beidz, aizver, aizvērt</code>
  </div>
